<html lang="en">

<style>
  :root {
    --ink: #171129;
    --ink-raise: #211a38;
    --milk: #f3ebd3;
    --dim: #8f84b5;
    --dim-border: rgba(143, 132, 181, 0.35);
    --ink-panel: rgba(33, 26, 56, 0.55);
    --glow: rgba(127, 211, 72, 0.16);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--milk);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: grid;
    place-items: center;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: min(100%, 960px);
    gap: 24px;
    padding: 32px 24px;
    text-align: center;
  }
  .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--dim);
  }
  /* Limited-time World Cup ribbon — Spain's red/gold over the ink panel. Date-
     gated and dismissible; the whole block lifts out cleanly when it's over. */
  .campaign {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 540px;
    margin: 0 auto 4px;
    padding: 8px 14px;
    border: 1px solid var(--dim-border);
    border-radius: 999px;
    background:
      linear-gradient(90deg, rgba(242, 93, 126, 0.18), rgba(238, 214, 85, 0.16), rgba(242, 93, 126, 0.18)),
      var(--ink-panel);
    font-size: 12px;
    line-height: 1.3;
    color: var(--milk);
    text-align: center;
  }
  .campaign[hidden] { display: none; }
  /* Red-yellow-red flag chip (Spain's 1:2:1 stripe ratio). A drawn chip, not the
     🇪🇸 emoji — that renders as bare "ES" on Windows Chrome/Edge, and a flat chip
     suits the pixel aesthetic better anyway. */
  .campaign-flag {
    flex-shrink: 0;
    width: 21px;
    height: 14px;
    border-radius: 2px;
    background: linear-gradient(to bottom,
      #c60b1e 0 25%, #ffc400 25% 75%, #c60b1e 75% 100%);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
  }
  .campaign-cta {
    border: 0;
    background: none;
    padding: 0;
    color: var(--milk);
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    white-space: nowrap;
  }
  .campaign-cta:hover { color: #ffdce6; }
  .campaign-cta:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; border-radius: 3px; }
  .campaign-dismiss {
    flex-shrink: 0;
    border: 0;
    background: none;
    padding: 2px 4px;
    color: var(--dim);
    font: inherit;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }
  .campaign-dismiss:hover { color: var(--milk); }
  .campaign-dismiss:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; border-radius: 3px; }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .maker {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    align-items: center;
    gap: 40px;
    width: 100%;
  }
  .preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }
  .stage {
    position: relative;
    border: 0;
    background: none;
    cursor: pointer;
    padding: 12px;
    border-radius: 16px;
  }
  .stage:focus-visible {
    outline: 2px solid var(--dim);
    outline-offset: 4px;
  }
  .stage::before {
    content: "";
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(closest-side, var(--glow), transparent 70%);
    transition: background 0.4s;
    pointer-events: none;
  }
  #pet {
    display: block;
    position: relative;
    width: 336px;
    max-width: 78vw;
    image-rendering: pixelated;
  }
  .caption { font-size: 12px; color: var(--dim); letter-spacing: 0.08em; }
  .pet-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: -8px; /* snug against the caption below it */
    overflow-wrap: anywhere;
  }
  .pet-name[hidden] { display: none; }
  .gift-tag {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 440px;
    /* The top ~7 grid rows of the canvas are empty air above the resting dome, but the
       boing jump's apex (jelly-core's BOING [1.22, lift 4] frame) reaches row ~0 — the
       very top of the canvas, with no room to spare. -28px cancels the preview gap +
       stage padding, landing the tag flush with the canvas top; "+ 1 grid row" (canvas
       size / 24, matching #pet) pushes it back up so it clears the boing peak at every
       width instead of colliding with it mid-jump. */
    margin-bottom: calc(-28px + min(336px, 78vw) / 24);
    position: relative;
    z-index: 1;
  }
  .gift-tag[hidden] { display: none; }
  .gift-to {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .gift-note {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.06em;
    overflow-wrap: anywhere;
  }
  .gift-back {
    min-height: 44px;
    padding: 0 8px;
    border: 0;
    border-radius: 4px;
    background: none;
    color: var(--dim);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: underline;
    text-underline-offset: 4px;
  }
  .gift-back:hover { color: var(--milk); }
  .gift-back:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; }
  .gift-input {
    width: 100%;
    min-height: 40px;
    padding: 8px 12px;
    border: 1px solid var(--dim-border);
    border-radius: 8px;
    background: var(--ink);
    color: var(--milk);
    font: inherit;
    font-size: 12px;
    letter-spacing: 0.06em;
  }
  .gift-input::placeholder { color: var(--dim); opacity: 0.8; }
  .gift-input:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; }
  .seed-button {
    align-self: flex-start;
    min-height: 36px;
    padding: 0 2px;
    border: 0;
    background: none;
    color: var(--dim);
    cursor: pointer;
    font: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: underline;
    text-underline-offset: 4px;
  }
  .seed-button:hover { color: var(--milk); }
  .seed-button:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; }
  .customize {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    padding: 20px;
    border: 1px solid var(--dim-border);
    border-radius: 16px;
    background: var(--ink-panel);
    text-align: left;
    box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.18);
  }
  .customize-title,
  .setting-label {
    color: var(--dim);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .customize-title { color: var(--milk); font-size: 11px; }
  .setting { display: flex; flex-direction: column; gap: 8px; }
  .setting[hidden] { display: none; }
  .animations {
    display: flex;
    width: 100%;
    justify-content: center;
    gap: 6px;
    padding: 4px;
    border-radius: 10px;
    background: var(--ink);
  }
  .faces {
    display: flex;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 0;
    border: 0;
    background: none;
  }
  .faces[hidden] { display: none; }
  /* 14 wardrobe options: a grid, not a flex row — flex:1 children shrink to
     slivers instead of wrapping. Five per row matches the face-portrait size. */
  #accessories { display: grid; grid-template-columns: repeat(5, 1fr); }
  .face-choice {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: 0;
    min-height: 70px;
    gap: 3px;
    padding: 5px 4px 6px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .face-preview {
    width: 56px;
    height: auto;
    max-width: none;
    transition: transform 0.15s steps(2, end);
  }
  .face-choice:hover { color: var(--milk); }
  .face-choice:hover .face-preview { transform: translateY(-2px) scale(1.06); }
  .face-choice[aria-pressed="true"] {
    border-color: var(--milk);
    background: var(--ink-panel);
    color: var(--milk);
    box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.28);
  }
  .face-choice[aria-pressed="true"] .face-preview { transform: translateY(-2px); }
  .face-choice:focus-visible { outline: 2px solid var(--milk); outline-offset: 3px; }
  .animation {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 8px 14px;
    border: 0;
    border-radius: 7px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .animation:hover { color: var(--milk); }
  .animation[aria-pressed="true"] { background: var(--dim); color: var(--ink); }
  .animation:focus-visible { outline: 2px solid var(--milk); outline-offset: 2px; }
  /* Two rows of three: six flavors in one flex row would crush the labels. */
  .flavors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
  .flavor {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    gap: 7px;
    background: none;
    border: 0;
    cursor: pointer;
    color: var(--dim);
    font: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px;
    border-radius: 10px;
  }
  .flavor .cube {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    box-shadow: inset -3px -4px 0 rgba(0, 0, 0, 0.28), inset 2px 3px 0 rgba(255, 255, 255, 0.32);
    transition: transform 0.15s;
  }
  .flavor:hover .cube { transform: scale(1.18) rotate(-6deg); }
  .flavor[aria-pressed="true"] { color: var(--milk); }
  .flavor[aria-pressed="true"] .cube { outline: 2px solid var(--milk); outline-offset: 3px; }
  .flavor:focus-visible { outline: 2px solid var(--dim); }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 18px;
    border-top: 1px solid var(--dim-border);
  }
  .secondary-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .export {
    width: 100%;
    min-height: 44px;
    padding: 10px 12px;
    border: 2px solid var(--dim);
    border-radius: 8px;
    background: var(--ink-raise);
    color: var(--milk);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.28);
  }
  .export:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.28); }
  .export:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.28); }
  .export:focus-visible { outline: 2px solid var(--milk); outline-offset: 4px; }
  .export:disabled { cursor: wait; opacity: 0.65; }
  .export-primary {
    background: var(--milk);
    border-color: var(--milk);
    color: var(--ink);
  }
  .export-status { min-height: 1.2em; font-size: 10px; color: var(--dim); letter-spacing: 0.08em; }
  @media (prefers-reduced-motion: reduce) {
    .face-preview { transition: none; }
  }
  @media (max-height: 700px) {
    main { gap: 12px; padding-block: 20px; }
    #pet { width: 280px; max-width: 72vw; }
  }
  @media (max-width: 799px) {
    main { width: min(100%, 600px); gap: 20px; padding: 40px 24px; }
    .maker { display: flex; flex-direction: column; gap: 20px; }
    .preview, .customize { width: 100%; }
    .gift-tag { margin-top: 14px; } /* stacked layout: detach the tag from the brand */
  }
  /* 460, not 420: five 56px face portraits + gaps overflow the panel below ~455px */
  @media (max-width: 460px) {
    main { padding-inline: 16px; }
    .caption { font-size: 11px; letter-spacing: 0.04em; }
    .customize { gap: 16px; padding: 16px 14px; }
    .faces { gap: 2px; }
    .face-choice {
      flex: 0 0 calc((100% - 4px) / 3);
      max-width: 88px;
      padding-inline: 1px;
      font-size: 9px;
      letter-spacing: 0.04em;
    }
    .face-preview { width: 48px; }
    .flavors { gap: 2px; }
    .flavor { min-width: 0; padding-inline: 2px; font-size: 9px; letter-spacing: 0.08em; }
    #accessories { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>
<main>
  <div class="campaign" id="campaign" hidden>
    <span class="campaign-flag" aria-hidden="true"></span>
    <span>Spain won the World Cup —
      <button class="campaign-cta" id="make-champion" type="button">make a champion ⚽</button></span>
    <button class="campaign-dismiss" id="campaign-dismiss" type="button" aria-label="dismiss">✕</button>
  </div>
  <header class="brand">
    <div class="eyebrow">pixel pet maker</div>
    <h1>jellybones</h1>
  </header>
  <div class="maker">
    <section class="preview" aria-label="pet preview">
      <div class="gift-tag" id="gift-tag" hidden>
        <div class="gift-to" id="gift-to"></div>
        <div class="gift-note" id="gift-note"></div>
      </div>
      <button class="stage" id="stage" aria-label="poke the jelly">
        <canvas id="pet" width="336" height="336"></canvas>
      </button>
      <div class="pet-name" id="pet-name" hidden></div>
      <div class="caption" id="caption">poke the jelly</div>
      <button class="gift-back" id="gift-back" type="button" hidden>send one back ♥</button>
    </section>
    <section class="customize" aria-labelledby="customize-title">
      <h2 class="customize-title" id="customize-title">customize</h2>
      <div class="setting">
        <div class="setting-label" id="name-label">name</div>
        <input class="gift-input" id="name-input" type="text" maxlength="16"
          placeholder="name your pet" aria-label="pet name"
          autocomplete="off" spellcheck="false">
        <button class="seed-button" id="seed" type="button">✨ pet from your name</button>
      </div>
      <div class="setting">
        <div class="setting-label" id="flavor-label">flavor</div>
        <div class="flavors" id="flavors" role="group" aria-labelledby="flavor-label"></div>
      </div>
      <div class="setting" id="face-setting">
        <div class="setting-label" id="face-label">face</div>
        <div class="faces" id="faces" role="group" aria-labelledby="face-label"></div>
      </div>
      <div class="setting">
        <div class="setting-label" id="accessory-label">extra</div>
        <div class="faces" id="accessories" role="group" aria-labelledby="accessory-label"></div>
      </div>
      <div class="setting">
        <div class="setting-label" id="motion-label">motion</div>
        <div class="animations" id="animations" role="group" aria-labelledby="motion-label">
          <button class="animation" type="button" data-mode="idle" aria-pressed="true">wobble</button>
          <button class="animation" type="button" data-mode="boing" aria-pressed="false">boing</button>
          <button class="animation" type="button" data-mode="kickups" aria-pressed="false">kickups</button>
          <button class="animation" type="button" data-mode="sleep" aria-pressed="false">sleep</button>
        </div>
      </div>
      <div class="setting">
        <div class="setting-label" id="gift-label">gift</div>
        <input class="gift-input" id="gift-to-input" type="text" maxlength="24"
          placeholder="their name" aria-label="gift recipient name"
          autocomplete="off" spellcheck="false">
        <input class="gift-input" id="gift-note-input" type="text" maxlength="80"
          placeholder="a tiny note (optional)" aria-label="gift note" autocomplete="off">
      </div>
      <div class="actions">
        <button class="export export-primary" id="share" type="button">share</button>
        <div class="secondary-actions">
          <button class="export" id="export" type="button">wobble gif</button>
          <button class="export" id="pack" type="button">emoji pack</button>
        </div>
      </div>
      <div class="export-status" id="export-status" role="status" aria-live="polite"></div>
    </section>
  </div>
</main>

<script type="module">
import {
  ACCESSORIES, BOING, BOING_LOOP, COMMON, FACES, FLAVORS, GRID, FPS,
  KICKUPS, KICKUPS_X, KICKUPS_CONFETTI, NAME_MAX,
  cleanGift, cleanText, makeGif, makeZip, modeGrids, parseSlug, renderGrid, seedPet, stateSlug,
} from "/jelly-core.mjs";

const SCALE = 14;

const canvas = document.getElementById("pet");
canvas.width = GRID * SCALE;
canvas.height = GRID * SCALE;
const ctx = canvas.getContext("2d");
const FULL_GRID = { x: 0, y: 0, width: GRID, height: GRID };
const FACE_CROP = { x: 5, y: 6, width: 14, height: 10 };
const FACE_SCALE = 4;
const MODE_LABELS = { idle: "wobble", boing: "boing", sleep: "sleep", kickups: "kickups" };

let flavor = "lime";
let face = "happy";
let accessory = "none";

function draw(g, target = ctx, scale = SCALE, crop = FULL_GRID) {
  const pal = { ...COMMON, ...FLAVORS[flavor] };
  target.clearRect(0, 0, target.canvas.width, target.canvas.height);
  for (let y = crop.y; y < crop.y + crop.height; y++)
    for (let x = crop.x; x < crop.x + crop.width; x++) {
      const c = pal[g[y][x]];
      if (c) {
        target.fillStyle = c;
        target.fillRect((x - crop.x) * scale, (y - crop.y) * scale, scale, scale);
      }
    }
}

const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const SLEEP_TICKS = FPS * 4;
let mode = "idle";
let modeAt = 0;
let boingAt = -Infinity;
let nextBlink = FPS * 3;
let blinkUntil = -1;
let lastTick = -1;

function frame(now) {
  const tick = Math.floor((now / 1000) * FPS);
  if (tick !== lastTick) {
    lastTick = tick;
    if (tick >= nextBlink) {
      blinkUntil = tick + 2;
      nextBlink = tick + Math.round(FPS * (2.5 + Math.random() * 3));
    }
    const blink = tick < blinkUntil;
    if (mode === "sleep") {
      const sleepTick = Math.max(0, tick - modeAt) % SLEEP_TICKS;
      const sleepProgress = sleepTick / SLEEP_TICKS;
      const s = reducedMotion ? 1 : 1 + 0.04 * Math.sin(2 * Math.PI * sleepProgress);
      draw(renderGrid(s, 0,
        { blink: true, sleepProgress: reducedMotion ? 0.25 : sleepProgress, accessory }));
    } else if (mode === "kickups") {
      // Reduced motion rests on the apex frame: ball aloft, jelly still.
      const f = reducedMotion ? 7 : Math.max(0, tick - modeAt) % KICKUPS.length;
      const [ballY, s, lift, mo] = KICKUPS[f];
      draw(renderGrid(s, lift, { blink, mouthOpen: !!mo, face, accessory,
        ball: { x: KICKUPS_X, y: ballY }, confetti: KICKUPS_CONFETTI[f] ?? null }));
    } else {
      // Boing mode loops the shared schedule; idle plays it once per click.
      let squash = 1, lift = 0, mouthOpen = 0;
      const step = mode === "boing"
        ? (reducedMotion ? null : BOING_LOOP[Math.max(0, tick - modeAt) % BOING_LOOP.length])
        : BOING[tick - boingAt];
      if (step) [squash, lift, mouthOpen] = step;
      else if (!reducedMotion && mode === "idle")
        squash = 1 + 0.055 * Math.sin((2 * Math.PI * tick) / (FPS * 1.4));
      draw(renderGrid(squash, lift, { blink, mouthOpen: !!mouthOpen, face, accessory }));
    }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const stage = document.getElementById("stage");

function boing() {
  if (mode === "sleep") {
    setMode("idle");
    return;
  }
  if (lastTick - boingAt >= BOING.length) boingAt = lastTick + 1;
}
stage.addEventListener("click", boing);

const caption = document.getElementById("caption");
const animationButtons = [...document.querySelectorAll(".animation")];

function setMode(nextMode) {
  mode = nextMode;
  modeAt = lastTick + 1;
  boingAt = -Infinity;
  animationButtons.forEach((button) => {
    button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
  });
  const sleeping = mode === "sleep";
  faceSetting.hidden = sleeping;
  stage.setAttribute("aria-label", sleeping ? "wake the jelly" : "poke the jelly");
  caption.textContent = sleeping ? "wake the jelly" : "poke the jelly";
  if (!exportButton.disabled) exportButton.textContent = `${MODE_LABELS[mode]} gif`;
  lastTick = -1;
  syncURL();
}

animationButtons.forEach((button) => {
  button.addEventListener("click", () => setMode(button.dataset.mode));
});

// Expression picker.
const faceSetting = document.getElementById("face-setting");
const facesEl = document.getElementById("faces");
FACES.forEach((name) => {
  const b = document.createElement("button");
  b.className = "face-choice";
  b.type = "button";
  b.dataset.face = name;
  b.setAttribute("aria-pressed", String(name === face));
  b.innerHTML = `<canvas class="face-preview" width="${FACE_CROP.width * FACE_SCALE}" height="${FACE_CROP.height * FACE_SCALE}" aria-hidden="true"></canvas><span>${name}</span>`;
  b.addEventListener("click", () => setFace(name));
  facesEl.appendChild(b);
});

function drawFacePreviews() {
  [...facesEl.children].forEach((b) => {
    const preview = b.querySelector("canvas").getContext("2d");
    draw(renderGrid(1, 0, { face: b.dataset.face }), preview, FACE_SCALE, FACE_CROP);
  });
}
drawFacePreviews();

function setFace(name) {
  face = name;
  [...facesEl.children].forEach((b) => {
    b.setAttribute("aria-pressed", String(b.dataset.face === face));
  });
  renderGift(); // the gift tag's ornament follows the face
  lastTick = -1; // repaint on next frame
  syncURL();
}

// Accessory picker — same pattern as faces, cropped to the head top.
const ACC_CROP = { x: 5, y: 2, width: 14, height: 8 };
const accessoriesEl = document.getElementById("accessories");
["none", ...ACCESSORIES].forEach((name) => {
  const b = document.createElement("button");
  b.className = "face-choice";
  b.type = "button";
  b.dataset.accessory = name;
  b.setAttribute("aria-pressed", String(name === accessory));
  b.innerHTML = `<canvas class="face-preview" width="${ACC_CROP.width * FACE_SCALE}" height="${ACC_CROP.height * FACE_SCALE}" aria-hidden="true"></canvas><span>${name}</span>`;
  b.addEventListener("click", () => setAccessory(name));
  accessoriesEl.appendChild(b);
});

function drawAccessoryPreviews() {
  [...accessoriesEl.children].forEach((b) => {
    const preview = b.querySelector("canvas").getContext("2d");
    draw(renderGrid(1, 0, { accessory: b.dataset.accessory }), preview, FACE_SCALE, ACC_CROP);
  });
}
drawAccessoryPreviews();

function setAccessory(name) {
  accessory = name;
  [...accessoriesEl.children].forEach((b) => {
    b.setAttribute("aria-pressed", String(b.dataset.accessory === accessory));
  });
  lastTick = -1; // repaint on next frame
  syncURL();
}

// Flavor swatches + 1/2/3 keys.
const flavorsEl = document.getElementById("flavors");
Object.entries(FLAVORS).forEach(([name, f], i) => {
  const b = document.createElement("button");
  b.className = "flavor";
  b.type = "button";
  b.setAttribute("aria-keyshortcuts", String(i + 1));
  b.setAttribute("aria-pressed", String(name === flavor));
  b.innerHTML = `<span class="cube" style="background:${f.B}" aria-hidden="true"></span><span>${name}</span>`;
  b.addEventListener("click", () => setFlavor(name));
  flavorsEl.appendChild(b);
});

function setFlavor(name) {
  flavor = name;
  document.documentElement.style.setProperty("--glow", FLAVORS[name].glow);
  document.querySelectorAll(".flavor").forEach((b, i) => {
    b.setAttribute("aria-pressed", String(Object.keys(FLAVORS)[i] === name));
  });
  drawFacePreviews();
  drawAccessoryPreviews();
  lastTick = -1; // repaint on next frame
  syncURL();
}

const exportButton = document.getElementById("export");
const exportStatus = document.getElementById("export-status");

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const petName = (forMode) => [
  flavor,
  forMode !== "sleep" && face !== "happy" ? face : null,
  accessory !== "none" ? accessory : null,
  MODE_LABELS[forMode],
].filter(Boolean).join("-");

exportButton.addEventListener("click", async () => {
  exportButton.disabled = true;
  exportButton.textContent = "making gif…";
  exportStatus.textContent = "Building frames…";
  try {
    await new Promise((resolve) => requestAnimationFrame(resolve));
    const name = petName(mode);
    const grids = modeGrids(mode, { face, accessory });
    const blob = new Blob([makeGif(grids, flavor)], { type: "image/gif" });
    downloadBlob(blob, `${fileSafeName() || "jellybones"}-${name}.gif`);
    exportStatus.textContent = `${name} exported · ${Math.ceil(blob.size / 1024)} KB`;
  } catch (error) {
    console.error(error);
    exportStatus.textContent = "Export failed — please try again.";
  } finally {
    exportButton.disabled = false;
    exportButton.textContent = `${MODE_LABELS[mode]} gif`;
  }
});

// Slack emoji pack: the three core animations as small GIFs (120×120 — under
// Slack's 128 px emoji cap), plus the current mode when it's an extra one (so a
// kickups champion ships their juggle too), zipped client-side.
const packButton = document.getElementById("pack");
packButton.addEventListener("click", async () => {
  packButton.disabled = true;
  packButton.textContent = "packing…";
  exportStatus.textContent = "Building emoji pack…";
  try {
    await new Promise((resolve) => requestAnimationFrame(resolve));
    // Filenames become Slack emoji names — a named pet ships as :boba-boing:.
    const emojiBase = fileSafeName();
    const files = [...new Set(["idle", "boing", "sleep", mode])].map((m) => ({
      name: emojiBase ? `${emojiBase}-${MODE_LABELS[m]}.gif` : `jelly-${petName(m)}.gif`,
      data: makeGif(modeGrids(m, { face, accessory }), flavor, { scale: 5 }),
    }));
    const blob = new Blob([makeZip(files)], { type: "application/zip" });
    downloadBlob(blob, `jellybones-${emojiBase || flavor}-emoji.zip`);
    exportStatus.textContent =
      `emoji pack · ${Math.ceil(blob.size / 1024)} KB · upload each gif as a Slack emoji`;
  } catch (error) {
    console.error(error);
    exportStatus.textContent = "Pack failed — please try again.";
  } finally {
    packButton.disabled = false;
    packButton.textContent = "emoji pack";
  }
});

addEventListener("keydown", (e) => {
  if (e.target instanceof HTMLInputElement) return; // typing a gift, not picking a flavor
  const names = Object.keys(FLAVORS);
  if (e.key >= "1" && e.key <= String(names.length)) setFlavor(names[e.key - 1]);
});

// Shareable pet state. Canonical form is /p/<slug> (needs the deploy rewrite); ?p=<slug>
// works on any static server. Slug tokens are order-insensitive and unknown tokens are
// ignored, so links stay valid as parts are added — a bad link degrades to the default pet.
function syncURL() {
  const slug = stateSlug(flavor, mode, face, accessory);
  const { to, note } = gift();
  const name = petDisplayName();
  const params = new URLSearchParams();
  // Canonical /p/<slug> everywhere it can unfurl: static files beat rewrites on
  // Vercel, so the ?p= form never reaches pet-page — it survives only for local
  // dev, where /p/* has no rewrite and would 404 on reload.
  const local = location.protocol === "file:" ||
    ["localhost", "127.0.0.1"].includes(location.hostname);
  if (local && slug) params.set("p", slug);
  if (name) params.set("name", name);
  if (to) params.set("to", to);
  if (to && note) params.set("note", note);
  // Gifted or named default pets still get a real /p/ path (`flavor` round-trips
  // through parseSlug) so the unfurl can carry the name/recipient.
  const path = local
    ? location.pathname
    : (slug ? `/p/${slug}` : (to || name ? `/p/${flavor}` : "/"));
  const query = params.toString();
  try {
    history.replaceState(null, "", query ? `${path}?${query}` : path);
  } catch { /* file:// forbids URL rewrites; sharing still works via the share button */ }
}

function applySlug(slug) {
  const pet = parseSlug(slug);
  setFlavor(pet.flavor);
  setFace(pet.face);
  setAccessory(pet.accessory);
  setMode(pet.mode);
}

// navigator.share exists on some desktop browsers too (Edge, some Chrome builds) and
// pops the OS share sheet — wrong for a click on a desktop page. Gate it on mobile
// instead of just feature-detecting: coarse pointer + narrow viewport is a decent proxy.
const isMobile = () => matchMedia("(pointer: coarse)").matches && matchMedia("(max-width: 768px)").matches;

const shareButton = document.getElementById("share");
shareButton.addEventListener("click", async () => {
  syncURL();
  recordSent(); // sharing definitely means "I composed this"
  const { to } = gift();
  const nativeShare = typeof navigator.share === "function" && isMobile();
  try {
    if (nativeShare) {
      const name = petDisplayName();
      await navigator.share({
        title: "jellybones",
        text: to
          ? `a tiny jelly pet for ${to}`
          : (name ? `meet ${name}, my tiny jelly pet` : "meet my tiny jelly pet"),
        url: location.href,
      });
      shareButton.textContent = "shared!";
      exportStatus.textContent = "Pet shared.";
    } else {
      await navigator.clipboard.writeText(location.href);
      shareButton.textContent = "copied!";
      exportStatus.textContent = "Link copied.";
    }
  } catch (error) {
    if (nativeShare && error?.name === "AbortError") return;
    if (nativeShare) {
      try {
        await navigator.clipboard.writeText(location.href);
        shareButton.textContent = "copied!";
        exportStatus.textContent = "Link copied.";
      } catch {
        shareButton.textContent = "share failed";
        exportStatus.textContent = "Sharing failed — please try again.";
      }
    } else {
      shareButton.textContent = "share failed";
      exportStatus.textContent = "Sharing failed — please try again.";
    }
  }
  setTimeout(() => { shareButton.textContent = shareLabel(); }, 1200);
});

// Gift tag: ?to= names the recipient, ?note= adds a message — free text rides the
// query string, never the slug. The tag over the pet doubles as a live preview
// while composing: the sender sees exactly what the recipient will.
const giftToInput = document.getElementById("gift-to-input");
const giftNoteInput = document.getElementById("gift-note-input");

// Pet name: free text like the gift fields — rides ?name=, never the slug.
// Naming turns a graphic into a character; the nameplate sits under the stage.
const nameInput = document.getElementById("name-input");
const petNameEl = document.getElementById("pet-name");
const petDisplayName = () => cleanText(nameInput.value, NAME_MAX);
// Filename-safe form: any-script letters/digits survive, everything else → dash.
const fileSafeName = () =>
  petDisplayName().toLowerCase().replace(/[^\p{L}\p{N}]+/gu, "-").replace(/^-+|-+$/g, "");

function renderName() {
  const name = petDisplayName();
  petNameEl.hidden = !name;
  petNameEl.textContent = name;
}

// "What's your jellybone?" — the typed name deterministically divines a pet.
// Same name, same jelly, on anyone's machine: that's what makes people compare.
const seedButton = document.getElementById("seed");
seedButton.addEventListener("click", () => {
  const name = petDisplayName();
  if (!name) {
    nameInput.focus();
    exportStatus.textContent = "type a name first — the bones need something to read";
    return;
  }
  const pet = seedPet(name);
  setFlavor(pet.flavor);
  setFace(pet.face);
  setAccessory(pet.accessory);
  if (mode === "sleep") setMode(pet.mode); // wake up for the reveal
  boing(); // the reveal moment
  caption.textContent = "the bones have spoken";
  exportStatus.textContent = "";
  syncURL();
});
const giftTag = document.getElementById("gift-tag");
const giftToEl = document.getElementById("gift-to");
const giftNoteEl = document.getElementById("gift-note");
const giftBackButton = document.getElementById("gift-back");

const gift = () => cleanGift({ to: giftToInput.value, note: giftNoteInput.value });
const shareLabel = () => {
  const { to } = gift();
  return to ? `send to ${to.length > 11 ? `${to.slice(0, 10)}…` : to}` : "share";
};

// The tag's ornament follows the chosen face — the face is the mood of the gift,
// so a grump gift reads deadpan instead of romantic. No toggle: one less option.
const ORNAMENTS = { happy: "♥", wink: "☆", ooh: "!", grump: "·", love: "♥♥" };

function renderGift() {
  const { to, note } = gift();
  giftTag.hidden = !to;
  const ornament = (text) => {
    const span = document.createElement("span");
    span.textContent = text;
    span.setAttribute("aria-hidden", "true"); // decoration; readers hear just "for sam"
    return span;
  };
  const orn = ORNAMENTS[face] ?? ORNAMENTS.happy;
  giftToEl.replaceChildren(
    ornament(`${orn} `), document.createTextNode(to ? `for ${to}` : ""), ornament(` ${orn}`));
  giftNoteEl.textContent = note ? `“${note}”` : "";
  shareButton.textContent = shareLabel(); // share is always primary; a gift relabels it
}

// Reloading your own composed link must not read as an arrival, so gifts made on
// this device are remembered locally and skip the "someone made this for you"
// treatment. Wrong only across devices/private mode, where it errs safe (arrival).
const SENT_KEY = "jellybones-sent";
const giftSig = ({ to, note }) => `${to}\n${note}`;
let sentGifts = [];
try { sentGifts = JSON.parse(localStorage.getItem(SENT_KEY) ?? "[]"); } catch { /* private mode */ }
function recordSent() {
  const g = gift();
  if (!g.to) return;
  sentGifts = [...sentGifts.filter((sig) => sig !== giftSig(g)), giftSig(g)].slice(-50);
  try { localStorage.setItem(SENT_KEY, JSON.stringify(sentGifts)); } catch { /* private mode */ }
}

let giftURLTimer;
[nameInput, giftToInput, giftNoteInput].forEach((input) => {
  input.addEventListener("input", () => {
    renderGift();
    renderName();
    // Debounced: Safari rate-limits replaceState; per-keystroke sync would trip it.
    clearTimeout(giftURLTimer);
    giftURLTimer = setTimeout(() => { syncURL(); recordSent(); }, 400);
  });
});

// The loop-closer on an arriving gift: clear the tag, hand over the pen.
giftBackButton.addEventListener("click", () => {
  giftToInput.value = "";
  giftNoteInput.value = "";
  giftBackButton.hidden = true;
  renderGift();
  syncURL();
  giftToInput.focus();
  exportStatus.textContent = "your turn — remix it and send it";
});

// Limited-time World Cup moment: a one-tap champion (strawberry, juggling,
// named ¡Campeones!) plus a dismissible ribbon that auto-expires after the
// campaign window. The pet parts themselves are evergreen and link-safe; only
// this banner is date-gated — when it lapses the whole block lifts out cleanly.
const CAMPAIGN_UNTIL = Date.parse("2026-08-10T00:00:00Z");
const CAMPAIGN_DISMISSED_KEY = "jellybones-campaign-dismissed";
const campaign = document.getElementById("campaign");
const campaignLive = () => {
  if (Date.now() >= CAMPAIGN_UNTIL) return false;
  try { return localStorage.getItem(CAMPAIGN_DISMISSED_KEY) !== "1"; } catch { return true; }
};
campaign.hidden = !campaignLive();

function makeChampion() {
  nameInput.value = "¡Campeones!";
  setFlavor("strawberry");
  setFace("happy");
  setAccessory("none");
  setMode("kickups");
  renderName();
  renderGift();
  caption.textContent = "¡campeones del mundo!";
  syncURL();
}
document.getElementById("make-champion").addEventListener("click", makeChampion);
document.getElementById("campaign-dismiss").addEventListener("click", () => {
  campaign.hidden = true;
  try { localStorage.setItem(CAMPAIGN_DISMISSED_KEY, "1"); } catch { /* private mode */ }
});

const startParams = new URLSearchParams(location.search);
const startSlug = location.pathname.match(/\/p\/([a-z-]+)/i)?.[1] ?? startParams.get("p");
const arrivedGift = cleanGift({ to: startParams.get("to"), note: startParams.get("note") });
giftToInput.value = arrivedGift.to;
giftNoteInput.value = arrivedGift.note;
nameInput.value = cleanText(startParams.get("name"), NAME_MAX);
renderGift();
renderName();
if (startSlug) applySlug(startSlug);
if (arrivedGift.to) {
  // Arrival treatment only for gifts NOT composed on this device.
  if (!sentGifts.includes(giftSig(arrivedGift))) {
    giftBackButton.hidden = false;
    caption.textContent = "someone made this for you";
  }
}
if (arrivedGift.to || petDisplayName()) {
  syncURL(); // normalize the arrival URL (sanitized fields, canonical /p/ path)
}
</script>
</body>
</html>
